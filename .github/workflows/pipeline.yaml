name: Console Service Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: ['release/**']
    tags:
      - 'v*'
    paths:
      - ".github/workflows/pipeline.yaml"
      - "Dockerfile"
      - "deploy/single-node/**"
      - "package.json"
      - "yarn.lock"
      - "src/**"
      - "scripts/**"
      - "public/**"
      - "scripts/prebuild.sh"
      - "contentlayer.config.ts"
      - "next.config.js"
      - "next.config.mjs"
  workflow_dispatch:
    inputs:
      target_host:
        description: Ansible host or alias
        required: false
        default: ""
        type: string
      deployment_environment:
        description: Deployment environment
        required: true
        default: uat
        type: choice
        options: [dev, uat, prod]
      run_apply:
        description: Apply deployment
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: console-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

env:
  VAULT_ADDR: https://vault.svc.plus
  CANONICAL_DOMAIN: console.xworkmate.com
  SERVED_DOMAINS: console.xworkmate.com console.svc.plus
  ALIAS_DOMAIN: www.xworkmate.com
  APP_BASE_URL: https://console.xworkmate.com
  NEXT_PUBLIC_APP_BASE_URL: https://console.xworkmate.com
  NEXT_PUBLIC_SITE_URL: https://console.xworkmate.com
  RUNTIME_HOSTNAME: console.xworkmate.com
  NEXT_RUNTIME_HOSTNAME: console.xworkmate.com
  NEXT_PUBLIC_RUNTIME_ENVIRONMENT: prod
  NEXT_PUBLIC_RUNTIME_REGION: cn
  ACCOUNT_SERVICE_URL: https://accounts.svc.plus
  CLOUDFLARE_ZONE_TAG: bf3427f83a2c52c8285ab3d741a6ee27
  CLOUDFLARE_WEB_ANALYTICS_SITE_TAG: 0973e84ec8872c67c570f8072e92e21b
  CLOUDFLARE_ACCOUNT_ID: e71be5efb76a6c54f78f008da4404f00
  GHCR_REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.actor }}

jobs:
  prep:
    name: Prep
    runs-on: ubuntu-latest
    outputs:
      target_host: ${{ steps.inputs.outputs.target_host }}
      run_apply: ${{ steps.inputs.outputs.run_apply }}
      deployment_environment: ${{ steps.inputs.outputs.deployment_environment }}
      image_tag: ${{ steps.metadata.outputs.image_tag }}
      image_ref: ${{ steps.metadata.outputs.image_ref }}
      image_latest_ref: ${{ steps.metadata.outputs.image_latest_ref }}
      ghcr_namespace: ${{ steps.metadata.outputs.ghcr_namespace }}
      push_latest: ${{ steps.push.outputs.push_latest }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Resolve Inputs
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET_HOST: ${{ inputs.target_host }}
          INPUT_RUN_APPLY: ${{ inputs.run_apply }}
          INPUT_ENVIRONMENT: ${{ inputs.deployment_environment }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          DEV_TARGET_HOST: ${{ vars.DEV_TARGET_HOST }}
          UAT_TARGET_HOST: ${{ vars.UAT_TARGET_HOST }}
          PROD_TARGET_HOST: ${{ vars.PROD_TARGET_HOST }}
        run: bash scripts/github-actions/resolve-workflow-inputs.sh

      - name: Compute Image Metadata
        id: metadata
        run: |
          bash scripts/github-actions/compute-frontend-release-metadata.sh

      - name: Resolve Push Latest
        id: push
        env:
          REF: ${{ github.ref }}
        run: bash scripts/github-actions/resolve-push-latest.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: prep
    env:
      NEXT_PUBLIC_RUNTIME_ENVIRONMENT: ${{ needs.prep.outputs.deployment_environment }}
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}
      image_tag: ${{ steps.publish.outputs.image_tag }}
    steps:
      - name: Check Out Repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set Up Docker Buildx
        run: bash scripts/github-actions/setup-docker-buildx.sh

      - name: Load Vault secrets (CICD)
        id: vault
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          role: github-actions-console
          jwtGithubAudience: vault
          secrets: |
            kv/data/CICD GHCR_TOKEN | GHCR_TOKEN

      - name: Log In To GHCR
        env:
          GHCR_TOKEN: ${{ steps.vault.outputs.GHCR_TOKEN }}
        run: bash scripts/github-actions/login-ghcr.sh

      - name: Publish Frontend Image
        id: publish
        env:
          IMAGE_REF: ${{ needs.prep.outputs.image_ref }}
          IMAGE_TAG: ${{ needs.prep.outputs.image_tag }}
          IMAGE_LATEST_REF: ${{ needs.prep.outputs.image_latest_ref }}
          PUSH_LATEST: ${{ needs.prep.outputs.push_latest }}
        run: bash scripts/github-actions/publish-frontend-image.sh

